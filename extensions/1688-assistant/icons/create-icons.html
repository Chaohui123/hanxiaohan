<!DOCTYPE html>
<html><body>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function draw(canvas, size) {
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#3b82f6';
  const r = size * 0.19;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size*0.35}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('O', size/2, size*0.38);
  ctx.font = `${size*0.13}px sans-serif`;
  ctx.fillText('1688', size/2, size*0.7);
}
draw(document.getElementById('c16'), 16);
draw(document.getElementById('c48'), 48);
draw(document.getElementById('c128'), 128);
// Auto-download
setTimeout(() => {
  ['16','48','128'].forEach(s => {
    const c = document.getElementById('c'+s);
    c.toBlob(b => {
      const a = document.createElement('a');
      a.download = 'icon'+s+'.png';
      a.href = URL.createObjectURL(b);
      a.click();
    });
  });
}, 500);
</script>
</body></html>
