global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "onzo-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-services:3000"]
    scrape_interval: 15s

  - job_name: "promo-agent"
    static_configs:
      - targets: ["promo-agent:9101"]
        labels: { job: "promo-agent" }

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
