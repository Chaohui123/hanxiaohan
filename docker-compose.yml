version: '3.8'

# ============================================================
# ONZO Production Docker Compose
# Start: docker compose --env-file .env.production up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f api-services
# ============================================================

services:
  # ---- PostgreSQL (Phase 2+, optional) ----
  postgres:
    image: postgres:16-alpine
    container_name: onzo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onzo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-onzo_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onzo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - full
      - production

  # ---- Redis (Phase 2+, optional) ----
  redis:
    image: redis:7-alpine
    container_name: onzo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - full
      - production

  # ---- ONZO API Services (core) ----
  api-services:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onzo-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - app_uploads:/app/uploads
      - app_dead_letter:/app/dead-letter
      - app_logs:/app/logs
      - app_data:/app/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    networks:
      - onzo-network

  # ---- Web Dashboard (React frontend) ----
  web-dashboard:
    build:
      context: .
      dockerfile: apps/web-dashboard/Dockerfile
    container_name: onzo-web-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api-services:
        condition: service_healthy
    networks:
      - onzo-network
    profiles:
      - full
      - production

  # ---- Caddy HTTPS Reverse Proxy (production) ----
  caddy:
    image: caddy:2-alpine
    container_name: onzo-caddy
    restart: unless-stopped
    depends_on:
      api-services:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_DOMAIN=${CADDY_DOMAIN:-localhost}
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_uploads:
    driver: local
  app_dead_letter:
    driver: local
  app_logs:
    driver: local
  app_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

  # ---- Prometheus Metrics ----
  prometheus:
    image: prom/prometheus:latest
    container_name: onzo-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - onzo-network
    profiles:
      - monitoring
      - full

  # ---- Grafana Dashboards ----
  grafana:
    image: grafana/grafana:latest
    container_name: onzo-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-onzo2026}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./docker/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - onzo-network
    profiles:
      - monitoring
      - full

  # ---- Jaeger Tracing (optional) ----
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: onzo-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - onzo-network
    profiles:
      - tracing
      - full

networks:
  onzo-network:
    driver: bridge
