version: '3.8'

# ============================================================
# ONZO Production Docker Compose
# Start (full stack):  docker compose --profile production --env-file .env.production up -d
# Start (standalone):  docker compose --profile standalone --env-file .env.production up -d
# Dev (hot reload):    docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile standalone up -d
# Stop:                docker compose down
# Logs:                docker compose logs -f api-services
# ============================================================

services:
  # ---- PostgreSQL (Phase 2+, optional) ----
  postgres:
    image: postgres:16-alpine
    container_name: onzo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onzo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-onzo_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onzo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - full
      - production

  # ---- Redis (Phase 2+, optional) ----
  redis:
    image: redis:7-alpine
    container_name: onzo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - full
      - production

  # ---- ONZO API Services (core) ----
  # Profiles:
  #   standalone: runs without PG/Redis (graceful degradation via getDb() catch)
  #   production: full stack with health-checked PG/Redis dependencies
  api-services:
    build:
      context: .
      dockerfile: docker/api-services/Dockerfile
    container_name: onzo-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - app_uploads:/app/uploads
      - app_dead_letter:/app/dead-letter
      - app_logs:/app/logs
      - app_data:/app/data
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_started
        required: false
      redis:
        condition: service_started
        required: false
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    networks:
      - onzo-network
    profiles:
      - standalone
      - production
      - full

  # ---- Web Dashboard (React frontend) ----
  web-dashboard:
    build:
      context: .
      dockerfile: apps/web-dashboard/Dockerfile
    container_name: onzo-web-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api-services:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - onzo-network
    profiles:
      - full
      - production

  # ---- Ops Agent (AI-powered operations bot) ----
  ops-agent:
    build:
      context: .
      dockerfile: docker/ops-agent/Dockerfile
    container_name: onzo-ops-agent
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - API_BASE_URL=http://api-services:3000
    depends_on:
      api-services:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - production
      - full

  # ---- Caddy HTTPS Reverse Proxy (production) ----
  caddy:
    image: caddy:2-alpine
    container_name: onzo-caddy
    restart: unless-stopped
    depends_on:
      api-services:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_DOMAIN=${CADDY_DOMAIN:-localhost}
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_uploads:
    driver: local
  app_dead_letter:
    driver: local
  app_logs:
    driver: local
  app_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

  # ---- Alertmanager ----
  alertmanager:
    image: prom/alertmanager:latest
    container_name: onzo-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - onzo-network
    profiles:
      - monitoring
      - full

  # ---- Prometheus Metrics ----
  prometheus:
    image: prom/prometheus:latest
    container_name: onzo-prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - onzo-network
    profiles:
      - monitoring
      - full

  # ---- Grafana Dashboards ----
  grafana:
    image: grafana/grafana:latest
    container_name: onzo-grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-onzo2026}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./docker/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - onzo-network
    profiles:
      - monitoring
      - full

  # ---- Jaeger Tracing (optional) ----
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: onzo-jaeger
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - onzo-network
    profiles:
      - tracing
      - full

networks:
  onzo-network:
    driver: bridge
