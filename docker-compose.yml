version: '3.8'

# ============================================================
# ONZO Production Docker Compose
#
# Profiles:
#   standalone  — API + agents only, no PG/Redis (SQLite fallback)
#   production  — Full stack: PG + Redis + API + Caddy + agents
#   full        — production + monitoring (Prometheus + Grafana + Alertmanager)
#   monitoring  — Prometheus + Grafana + Alertmanager only
#   tracing     — Jaeger only
#
# Start (full stack):  docker compose --profile production --env-file .env.production up -d
# Start (standalone):  docker compose --profile standalone --env-file .env.production up -d
# Start (everything):  docker compose --profile full --env-file .env.production up -d
# Dev (hot reload):    docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile standalone up -d
# Stop:                docker compose down
# Logs:                docker compose logs -f api-services
# ============================================================

services:
  # ---- PostgreSQL (Phase 2+, optional) ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: onzo-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onzo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-onzo_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onzo}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - full
      - production

  # ---- Redis (Phase 2+, optional) ----
  redis:
    image: redis:7-alpine
    container_name: onzo-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - full
      - production

  # ---- ONZO API Services (core) ----
  # Profiles:
  #   standalone: runs without PG/Redis (graceful degradation via getDb() catch)
  #   production: full stack with health-checked PG/Redis dependencies
  api-services:
    build:
      context: .
      dockerfile: docker/api-services/Dockerfile
    container_name: onzo-api
    restart: always
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - app_uploads:/app/uploads
      - app_dead_letter:/app/dead-letter
      - app_logs:/app/logs
      - app_data:/app/data
      # Dev mode: mount local dist to skip Docker rebuild (uncomment for dev)
      # - ./apps/api-services/dist:/app/apps/api-services/dist
      # - ./packages:/app/packages
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_started
        required: false
      redis:
        condition: service_started
        required: false
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - standalone
      - production
      - full

  # ---- Web Dashboard (React frontend) ----
  web-dashboard:
    build:
      context: .
      dockerfile: apps/web-dashboard/Dockerfile
    container_name: onzo-web-dashboard
    restart: always
    ports:
      - "8080:80"
    depends_on:
      api-services:
        condition: service_healthy
        required: false
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - onzo-network
    profiles:
      - full
      - production

  # ---- Ops Agent (AI-powered operations bot) ----
  ops-agent:
    build:
      context: .
      dockerfile: docker/ops-agent/Dockerfile
    container_name: onzo-ops-agent
    restart: always
    env_file:
      - .env.production
    environment:
      - API_BASE_URL=http://api-services:3000
      - OPS_FEISHU_PORT=${OPS_FEISHU_PORT:-8181}
    depends_on:
      api-services:
        condition: service_healthy
        required: false
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - production
      - full
      - standalone

  # ---- Promo Agent (AI-powered promotion & bidding bot) ----
  promo-agent:
    build:
      context: .
      dockerfile: docker/promo-agent/Dockerfile
    container_name: onzo-promo-agent
    restart: always
    env_file:
      - .env.production
    environment:
      - API_BASE_URL=http://api-services:3000
      - PROMO_AUTO_DECISION=${PROMO_AUTO_DECISION:-true}
      - PROMO_MIN_PROFIT_RATE=${PROMO_MIN_PROFIT_RATE:-0.10}
      - PROMO_MAX_DAILY_SPEND=${PROMO_MAX_DAILY_SPEND:-500}
      - PROMO_DECISION_INTERVAL_HOURS=${PROMO_DECISION_INTERVAL_HOURS:-4}
      - PROMO_MAX_DAILY_ACTIONS=${PROMO_MAX_DAILY_ACTIONS:-10}
      - PROMO_SCORE_THRESHOLD=${PROMO_SCORE_THRESHOLD:-40}
      - PROMO_FEISHU_PORT=${PROMO_FEISHU_PORT:-8182}
      - PROMO_HEALTH_PORT=${PROMO_HEALTH_PORT:-9101}
    depends_on:
      api-services:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9101/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - production
      - full
      - standalone

  # ---- n8n Workflow Automation (OPTIONAL — 内建 scheduler 已覆盖全部定时职责) ----
  # 默认不启动（独立 profile）。仅在需要可视化编排时启用:
  #   docker compose --profile production --profile n8n up -d
  n8n:
    image: n8nio/n8n:latest
    container_name: onzo-n8n
    restart: always
    env_file:
      - .env.production
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Moscow}
      # 工作流 HTTP 节点统一通过 $env 注入调用 api-services
      - ONZO_API_BASE=http://api-services:3000
      - ONZO_API_KEY=${API_KEY}
      # 桥接：工作流里用 $env.TELEGRAM_*，.env 里统一叫 NOTIFY_TELEGRAM_*
      - TELEGRAM_BOT_TOKEN=${NOTIFY_TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${NOTIFY_TELEGRAM_CHAT_ID:-}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      api-services:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - n8n

  # ---- Caddy HTTPS Reverse Proxy (production) ----
  caddy:
    image: caddy:2-alpine
    container_name: onzo-caddy
    restart: always
    depends_on:
      api-services:
        condition: service_healthy
        required: false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_DOMAIN=${CADDY_DOMAIN:-localhost}
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - onzo-network
    profiles:
      - production

  # ---- Alertmanager ----
  alertmanager:
    image: prom/alertmanager:latest
    container_name: onzo-alertmanager
    restart: always
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - onzo-network
    profiles:
      - monitoring
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---- Prometheus Metrics ----
  prometheus:
    image: prom/prometheus:latest
    container_name: onzo-prometheus
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - onzo-network
    profiles:
      - monitoring
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---- Grafana Dashboards ----
  grafana:
    image: grafana/grafana:latest
    container_name: onzo-grafana
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env.production}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./docker/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - onzo-network
    profiles:
      - monitoring
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---- Jaeger Tracing (optional) ----
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: onzo-jaeger
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - onzo-network
    profiles:
      - tracing
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_uploads:
    driver: local
  app_dead_letter:
    driver: local
  app_logs:
    driver: local
  app_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  n8n_data:
    driver: local

networks:
  onzo-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
