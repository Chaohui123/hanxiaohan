version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: onzo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: onzo
      POSTGRES_PASSWORD: Onzo@Prod2025StrongPass
      POSTGRES_DB: onzo_prod
    volumes:
      - /data/onzo/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onzo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onzo-network

  redis:
    image: redis:7-alpine
    container_name: onzo-redis
    restart: unless-stopped
    command: redis-server --requirepass Redis@Onzo2025Strong --appendonly yes
    volumes:
      - /data/onzo/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Redis@Onzo2025Strong", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onzo-network

  api-services:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onzo-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - /data/onzo/uploads:/app/uploads
      - /data/onzo/dead-letter:/app/dead-letter
      - /data/onzo/logs:/app/logs
      - /data/onzo/data:/app/data
    ports:
      - "3000:3000"
    networks:
      - onzo-network

  caddy:
    image: caddy:2-alpine
    container_name: onzo-caddy
    restart: unless-stopped
    depends_on:
      - api-services
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /data/onzo/caddy/Caddyfile:/etc/caddy/Caddyfile
      - /data/onzo/caddy/data:/data
      - /data/onzo/caddy/config:/config
      - /data/onzo/logs/caddy:/data/caddy
    networks:
      - onzo-network

networks:
  onzo-network:
    driver: bridge
