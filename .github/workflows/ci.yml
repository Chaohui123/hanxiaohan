name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: latest }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint || echo "Lint warnings found — review before merge"
      - name: Type Check
        run: pnpm exec tsc -b --noEmit
        # Hard-fail on type errors (no soft-fail)

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: latest }
      - uses: actions/setup-node@v4
        with: { node-version: ${{ matrix.node-version }}, cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Run Tests
        run: pnpm test
      - name: Coverage Report
        run: pnpm test -- --coverage
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with: { name: coverage, path: coverage/ }

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api-services/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-n8n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate n8n Workflows
        run: |
          for f in n8n/workflows/*.json; do
            echo "Validating $f"
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('  OK')"
          done
